<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GDG on Campus University of Osaka | Learning Resources</title>
  <meta property="og:title" content="GDG on Campus University of Osaka | Learning Resources">
  <meta property="og:description" content="GDG on Campus University of Osaka のコードラブ・スライド一覧">
  <meta property="og:type" content="website">
  <link rel="icon" href="assets/favicon.png">
  <style>
    @font-face {
      font-family: 'Google Sans';
      src: url('assets/GoogleSans-Variable.ttf') format('truetype');
      font-style: normal;
    }
    @font-face {
      font-family: 'Google Sans';
      src: url('assets/GoogleSans-Italic-Variable.ttf') format('truetype');
      font-style: italic;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gdg-blue:   #1a73e8;
      --gdg-red:    #ea4335;
      --gdg-yellow: #fbbc04;
      --gdg-green:  #34a853;
      --surface:    #ffffff;
      --bg:         #f8f9fa;
      --border:     #dadce0;
      --text-1:     #202124;
      --text-2:     #3c4043;
      --text-3:     #5f6368;
      --radius:     8px;
    }

    body {
      font-family: 'Google Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text-1);
    }
    .header-logo img { flex-shrink: 0; height: 32px; width: auto; }
    .header-logo-text {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }
    .header-logo-text span { color: var(--text-3); font-weight: 400; font-size: 14px; margin-left: 4px; }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 56px 24px 40px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .hero-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 20px;
    }
    .hero-title {
      font-size: 32px;
      font-weight: 500;
      color: var(--text-1);
    }
    .hero-desc {
      margin-top: 12px;
      font-size: 15px;
      color: var(--text-2);
      max-width: 560px;
      margin-inline: auto;
      line-height: 1.7;
    }

    /* ── Main layout ── */
    .main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
    }
    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      pointer-events: none;
    }
    #search {
      width: 100%;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0 16px 0 44px;
      font-size: 14px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text-1);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    #search:focus {
      border-color: var(--gdg-blue);
      box-shadow: 0 0 0 3px rgba(26,115,232,.15);
    }

    .filter-tabs {
      display: flex;
      gap: 6px;
    }
    .filter-tab {
      height: 36px;
      padding: 0 16px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
      font-size: 13px;
      font-family: inherit;
      color: var(--text-2);
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
    }
    .filter-tab.active {
      background: #e8f0fe;
      border-color: #c5d9f7;
      color: var(--gdg-blue);
      font-weight: 500;
    }
    .filter-tab:hover:not(.active) {
      background: var(--bg);
    }

    /* ── Card grid ── */
    #card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow .2s, border-color .2s;
      text-decoration: none;
      color: inherit;
    }
    .card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,.10);
      border-color: #c5c8cb;
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      background: linear-gradient(135deg, #e8f0fe 0%, #c5d9f7 100%);
    }
    .card-thumb.slide-thumb {
      background: linear-gradient(135deg, #fce8e6 0%, #f5c2be 100%);
    }
    .card-thumb-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-thumb-placeholder.codelab {
      background: linear-gradient(135deg, #e8f0fe 0%, #c5d9f7 100%);
    }
    .card-thumb-placeholder.slide {
      background: linear-gradient(135deg, #fce8e6 0%, #f5c2be 100%);
    }

    .card-body {
      padding: 20px 20px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
    }
    .card-badge.codelab {
      background: #e8f0fe;
      color: #1557b0;
    }
    .card-badge.slide {
      background: #fce8e6;
      color: #b31412;
    }
    .card-date {
      font-size: 12px;
      color: var(--text-3);
    }

    .card-title {
      font-size: 17px;
      font-weight: 500;
      line-height: 1.45;
      color: var(--text-1);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-2);
      line-height: 1.65;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
    }
    .card-duration {
      font-size: 12px;
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .card-action {
      font-size: 13px;
      font-weight: 500;
      color: var(--gdg-blue);
    }

    /* ── Empty state ── */
    #empty {
      display: none;
      text-align: center;
      padding: 64px 24px;
      color: var(--text-3);
    }
    #empty p { font-size: 15px; margin-top: 8px; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      #card-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      #card-grid { grid-template-columns: 1fr; }
      .hero-title { font-size: 24px; }
    }
  </style>
</head>
<body>

<header class="header">
  <a href="." class="header-logo">
    <img src="assets/gdg_logo.png" alt="GDG on Campus Osaka">
    <span class="header-logo-text">GDG on Campus Osaka <span>Education</span></span>
  </a>
</header>

<section class="hero">
  <div class="hero-logo">
    <img src="assets/gdg_logo.png" alt="GDG on Campus Osaka" style="height:56px;width:auto;">
    <h1 class="hero-title">Learning Resources</h1>
  </div>
  <p class="hero-desc">GDG on Campus University of Osaka が提供するハンズオン・コードラブとスライド資料の一覧です。</p>
</section>

<main class="main">
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search" type="search" placeholder="キーワードで検索..." autocomplete="off">
    </div>
    <div class="filter-tabs" role="group" aria-label="フィルター">
      <button class="filter-tab active" data-filter="all">すべて</button>
      <button class="filter-tab" data-filter="codelab">Codelab</button>
      <button class="filter-tab" data-filter="slide">Slide</button>
    </div>
  </div>

  <div id="card-grid"></div>
  <div id="empty">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#bdc1c6" stroke-width="1.5">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <p>該当するリソースが見つかりませんでした</p>
  </div>
</main>

<script>
const RESOURCES = [
  {
    "dir": "create-multi-agent",
    "type": "codelab",
    "title": "ADK x A2A x Agent Runtime で作るマルチエージェント AI",
    "description": "ADK 2.0、A2A、Agent Runtime で作るマルチエージェント AI ハンズオン",
    "image": "create-multi-agent/img/582b9fa44cbafcab.png",
    "duration": 198,
    "updated": "2026/05/27",
    "url": "create-multi-agent/"
  },
  {

    "title": "Lyria 3 Pro で音楽生成を体験しよう",

    "image": "try-lyria/img/661bd6c01f94ae72.png",
    "duration": 26,
    "updated": "2026/05/23",
    "url": "try-lyria/"
  },
  {
    "dir": "try-lyria",
    "type": "slide",
    "title": "Lyria 3 Pro で 音楽生成を 体験しよう",
    "description": "",
    "image": "try-lyria/slide/ogp.png",
    "duration": 0,
    "updated": "2026/05/23",
    "url": "try-lyria/slide/"
  },
  {
    "dir": "flutter-workshop",
    "type": "codelab",
    "title": "Flutter でミニ SNS アプリを作ろう",
    "description": "Flutter と Riverpod でミニ SNS フィードを作る本編 120 分 + Extra 付きハンズオン",
    "image": "flutter-workshop/img/bc4cb12a8b5ded04.png",
    "duration": 210,
    "updated": "2026/05/21",
    "url": "flutter-workshop/"
  },
  {
    "dir": "flutter-workshop",
    "type": "slide",
    "title": "Flutter で ミニ SNS アプリを作ろう",
    "description": "",
    "image": "flutter-workshop/slide/ogp.png",
    "duration": 0,
    "updated": "2026/05/21",
    "url": "flutter-workshop/slide/"
  },
  {
    "dir": "team-dev-onboarding",
    "type": "codelab",
    "title": "Web アプリ チーム開発 はじめの一歩",
    "description": "チーム開発に参加するための事前準備とハンズオン (clone → PR まで)",
    "image": "",
    "duration": 125,

    "url": "team-dev-onboarding/"
  },
  {
    "dir": "team-dev-onboarding",
    "type": "slide",
    "title": "Web アプリ チーム開発",
    "description": "",
    "image": "team-dev-onboarding/slide/ogp.png",
    "duration": 0,
    "updated": "2026/05/14",
    "url": "team-dev-onboarding/slide/"
  },
  {
    "dir": "portfolio-2026",
    "type": "codelab",
    "title": "ポートフォリオ Web サイト作成ワークショップ",
    "description": "2時間で完成！はじめてのポートフォリオサイト作成",

    "duration": 350,

  },
  {
    "dir": "portfolio-2026",
    "type": "slide",
    "title": "ポートフォリオ Web サイト",
    "description": "",
    "image": "portfolio-2026/slide/ogp.png",
    "duration": 0,
    "updated": "2026/05/11",
    "url": "portfolio-2026/slide/"
  },
  {
    "dir": "vibe-coding-hands-on",
    "type": "codelab",
    "title": "[20250514] [BwAI] Vibe coding hands-on w/ Cline, Cursor",
    "description": "",
    "image": "",
    "duration": 105,
    "updated": "2025/05/14",
    "url": "vibe-coding-hands-on/"
  },
  {
    "dir": "portfolio-2025",
    "type": "codelab",
    "title": "ポートフォリオ Web サイト作成ワークショップ",
    "description": "",
    "image": "",
    "duration": 195,
    "updated": "2025/04/21",
    "url": "portfolio-2025/"
  },
  {
    "dir": "first-portfolio-workshop-2hr-nogit",
    "type": "codelab",
    "title": "ポートフォリオ Web サイト作成ワークショップ",
    "description": "",
    "image": "",
    "duration": 125,
    "updated": "2025/04/14",
    "url": "first-portfolio-workshop-2hr-nogit/"
  }
];

let currentFilter = 'all';
let currentSearch = '';

function formatDuration(min) {
  if (!min) return '';
  if (min < 60) return `${min} 分`;
  const h = Math.floor(min / 60);
  const m = min % 60;
  return m ? `${h} 時間 ${m} 分` : `${h} 時間`;
}

function cardHTML(r) {
  const badge = r.type === 'codelab' ? 'Codelab' : 'Slide';
  const actionLabel = r.type === 'codelab' ? '開始' : '表示';

  let thumb;
  if (r.image) {
    thumb = `<img class="card-thumb${r.type === 'slide' ? ' slide-thumb' : ''}" src="${r.image}" alt="${r.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
             <div class="card-thumb-placeholder ${r.type}" style="display:none">${placeholderIcon(r.type)}</div>`;
  } else {
    thumb = `<div class="card-thumb-placeholder ${r.type}">${placeholderIcon(r.type)}</div>`;
  }

  const duration = r.duration ? `<span class="card-duration"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${formatDuration(r.duration)}</span>` : '<span></span>';

  return `<a class="card" href="${r.url}" target="_blank" rel="noopener" data-type="${r.type}" data-title="${r.title.toLowerCase()}" data-desc="${(r.description||'').toLowerCase()}">
  ${thumb}
  <div class="card-body">
    <div class="card-meta">
      <span class="card-badge ${r.type}">${badge}</span>
      ${r.updated ? `<span class="card-date">${r.updated}</span>` : ''}
    </div>
    <div class="card-title">${escHTML(r.title)}</div>
    ${r.description ? `<div class="card-desc">${escHTML(r.description)}</div>` : ''}
    <div class="card-footer">
      ${duration}
      <span class="card-action">${actionLabel} →</span>
    </div>
  </div>
</a>`;
}

function placeholderIcon(type) {
  if (type === 'codelab') {
    return `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="1.5" opacity="0.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`;
  }
  return `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ea4335" stroke-width="1.5" opacity="0.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>`;
}

function escHTML(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const q = currentSearch.toLowerCase();
  const grid = document.getElementById('card-grid');
  const empty = document.getElementById('empty');

  const filtered = RESOURCES.filter(r => {
    if (currentFilter !== 'all' && r.type !== currentFilter) return false;
    if (q) {
      return r.title.toLowerCase().includes(q) || (r.description || '').toLowerCase().includes(q);
    }
    return true;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    grid.innerHTML = filtered.map(cardHTML).join('');
  }
}

document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value;
  render();
});

render();
</script>
</body>
</html>
