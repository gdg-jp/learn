<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Parallel fan out and join</title>
  <desc id="desc">A graph workflow fans out to parallel research tasks and joins them before collecting reports.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#3C4043"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#202124" flood-opacity="0.12"/>
    </filter>
    <style>
      .font { font-family: "Google Sans", "Noto Sans JP", "Hiragino Sans", "Yu Gothic", Arial, sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #202124; }
      .sub { font-size: 20px; font-weight: 500; fill: #5F6368; }
      .label { font-size: 22px; font-weight: 700; fill: #202124; }
      .small { font-size: 17px; font-weight: 600; fill: #5F6368; }
      .mono { font-family: "Roboto Mono", "SFMono-Regular", Menlo, monospace; }
      .node { fill: #FFFFFF; stroke: #DADCE0; stroke-width: 2; }
      .route { stroke: #3C4043; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect width="1200" height="520" fill="#FFFFFF"/>
  <rect x="44" y="44" width="1112" height="432" rx="36" fill="#F1F3F4"/>
  <g class="font">
    <rect x="84" y="78" width="460" height="62" rx="18" fill="#4285F4"/>
    <text x="112" y="119" class="title" style="fill:#FFFFFF">並列タスク: fan out と join</text>
    <text x="84" y="174" class="sub">独立した task を同時に実行し、JoinNode ですべての結果を待って合流する</text>

    <g filter="url(#shadow)">
      <rect x="92" y="282" width="158" height="72" rx="36" fill="#4285F4"/>
      <text x="132" y="327" fill="#FFFFFF" class="label">Options</text>

      <rect x="360" y="206" width="214" height="66" rx="20" class="node"/>
      <text x="404" y="247" class="label">Research 1</text>

      <rect x="360" y="286" width="214" height="66" rx="20" class="node"/>
      <text x="404" y="327" class="label">Research 2</text>

      <rect x="360" y="366" width="214" height="66" rx="20" class="node"/>
      <text x="404" y="407" class="label">Research 3</text>

      <rect x="708" y="282" width="178" height="72" rx="22" fill="#E8F0FE" stroke="#C7D7FE" stroke-width="2"/>
      <circle cx="746" cy="318" r="18" fill="#FFFFFF"/>
      <path d="M737 312 h18 M737 324 h18" stroke="#4285F4" stroke-width="4" stroke-linecap="round"/>
      <text x="776" y="327" class="label">JoinNode</text>

      <rect x="982" y="282" width="150" height="72" rx="36" fill="#E6F4EA" stroke="#CEEAD6" stroke-width="2"/>
      <text x="1014" y="327" class="label">Reports</text>
    </g>

    <path d="M250 318 C300 318 304 239 352 239" class="route"/>
    <path d="M250 318 H352" class="route"/>
    <path d="M250 318 C300 318 304 399 352 399" class="route"/>
    <path d="M574 239 C632 239 642 318 700 318" class="route"/>
    <path d="M574 319 H700" class="route"/>
    <path d="M574 399 C632 399 642 318 700 318" class="route"/>
    <path d="M886 318 H974" class="route"/>
    <text x="270" y="282" class="small mono">fan out</text>
    <text x="902" y="298" class="small mono">join</text>
  </g>
</svg>
