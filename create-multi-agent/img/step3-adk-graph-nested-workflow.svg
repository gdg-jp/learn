<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Nested workflows</title>
  <desc id="desc">A coordinator workflow calls nested workflows for candidate generation, research, and specialist evaluation.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#3C4043"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#202124" flood-opacity="0.12"/>
    </filter>
    <style>
      .font { font-family: "Google Sans", "Noto Sans JP", "Hiragino Sans", "Yu Gothic", Arial, sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #202124; }
      .sub { font-size: 20px; font-weight: 500; fill: #5F6368; }
      .label { font-size: 22px; font-weight: 700; fill: #202124; }
      .small { font-size: 17px; font-weight: 600; fill: #5F6368; }
      .mono { font-family: "Roboto Mono", "SFMono-Regular", Menlo, monospace; }
      .node { fill: #FFFFFF; stroke: #DADCE0; stroke-width: 2; }
      .workflow { fill: #FFFFFF; stroke: #4285F4; stroke-width: 3; }
      .route { stroke: #3C4043; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect width="1200" height="520" fill="#FFFFFF"/>
  <rect x="44" y="44" width="1112" height="432" rx="36" fill="#F1F3F4"/>
  <g class="font">
    <rect x="84" y="78" width="486" height="62" rx="18" fill="#4285F4"/>
    <text x="112" y="119" class="title" style="fill:#FFFFFF">ネストされたワークフロー</text>
    <text x="84" y="174" class="sub">まとまった処理を別 Workflow に切り出し、親 workflow の node として組み込む</text>

    <rect x="84" y="220" width="1032" height="190" rx="30" fill="#E8EAED"/>
    <text x="116" y="260" class="label">Coordinator Workflow</text>

    <g filter="url(#shadow)">
      <rect x="118" y="302" width="116" height="62" rx="31" fill="#4285F4"/>
      <text x="148" y="341" fill="#FFFFFF" class="label">START</text>

      <rect x="308" y="282" width="210" height="102" rx="24" class="workflow"/>
      <text x="340" y="318" class="label">Candidate WF</text>
      <rect x="338" y="336" width="52" height="28" rx="10" fill="#E8F0FE"/>
      <rect x="402" y="336" width="52" height="28" rx="10" fill="#E8F0FE"/>
      <rect x="466" y="336" width="24" height="28" rx="10" fill="#E8F0FE"/>

      <rect x="578" y="282" width="210" height="102" rx="24" class="workflow"/>
      <text x="624" y="318" class="label">Research WF</text>
      <rect x="608" y="336" width="42" height="28" rx="10" fill="#E8F0FE"/>
      <rect x="660" y="336" width="42" height="28" rx="10" fill="#E8F0FE"/>
      <rect x="712" y="336" width="42" height="28" rx="10" fill="#E8F0FE"/>

      <rect x="848" y="282" width="210" height="102" rx="24" class="workflow"/>
      <text x="888" y="318" class="label">Evaluate WF</text>
      <rect x="878" y="336" width="46" height="28" rx="10" fill="#E8F0FE"/>
      <rect x="936" y="336" width="46" height="28" rx="10" fill="#E8F0FE"/>
      <rect x="994" y="336" width="36" height="28" rx="10" fill="#E8F0FE"/>
    </g>

    <path d="M234 333 H300" class="route"/>
    <path d="M518 333 H570" class="route"/>
    <path d="M788 333 H840" class="route"/>
    <text x="336" y="416" class="small mono">Workflow node</text>
    <text x="606" y="416" class="small">内部の Event もトレースに残る</text>
    <text x="864" y="416" class="small">最後の出力を親へ返す</text>
  </g>
</svg>
