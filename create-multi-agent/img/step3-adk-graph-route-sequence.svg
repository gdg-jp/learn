<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Route sequence</title>
  <desc id="desc">A graph workflow route sequence from START through multiple nodes to END.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#3C4043"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#202124" flood-opacity="0.12"/>
    </filter>
    <style>
      .font { font-family: "Google Sans", "Noto Sans JP", "Hiragino Sans", "Yu Gothic", Arial, sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #202124; }
      .sub { font-size: 20px; font-weight: 500; fill: #5F6368; }
      .label { font-size: 22px; font-weight: 700; fill: #202124; }
      .small { font-size: 17px; font-weight: 600; fill: #5F6368; }
      .mono { font-family: "Roboto Mono", "SFMono-Regular", Menlo, monospace; }
      .node { fill: #FFFFFF; stroke: #DADCE0; stroke-width: 2; }
      .route { stroke: #3C4043; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
    </style>
  </defs>
  <rect width="1200" height="520" fill="#FFFFFF"/>
  <rect x="44" y="44" width="1112" height="432" rx="36" fill="#F1F3F4"/>
  <g class="font">
    <rect x="84" y="78" width="318" height="62" rx="18" fill="#4285F4"/>
    <text x="112" y="119" class="title" style="fill:#FFFFFF">ルートシーケンス</text>
    <text x="84" y="174" class="sub">START から edge に沿って、定義した順番で node を実行する</text>

    <g filter="url(#shadow)">
      <rect x="84" y="246" width="126" height="72" rx="36" fill="#4285F4"/>
      <text x="116" y="291" fill="#FFFFFF" class="label">START</text>

      <rect x="300" y="226" width="158" height="112" rx="22" class="node"/>
      <circle cx="336" cy="282" r="18" fill="#E8F0FE"/>
      <path d="M336 270 v24 M324 282 h24" stroke="#4285F4" stroke-width="4" stroke-linecap="round"/>
      <text x="368" y="276" class="label">Clarify</text>
      <text x="368" y="304" class="small">希望を構造化</text>

      <rect x="548" y="226" width="158" height="112" rx="22" class="node"/>
      <circle cx="584" cy="282" r="18" fill="#E8F0FE"/>
      <path d="M574 282 h20 M584 272 v20" stroke="#4285F4" stroke-width="4" stroke-linecap="round"/>
      <text x="616" y="276" class="label">Candidate</text>
      <text x="616" y="304" class="small">候補生成</text>

      <rect x="796" y="226" width="158" height="112" rx="22" class="node"/>
      <circle cx="832" cy="282" r="18" fill="#E8F0FE"/>
      <path d="M821 282 h22 M832 271 v22" stroke="#4285F4" stroke-width="4" stroke-linecap="round"/>
      <text x="864" y="276" class="label">Evaluate</text>
      <text x="864" y="304" class="small">評価して保存</text>

      <rect x="1028" y="246" width="88" height="72" rx="36" fill="#E8EAED"/>
      <path d="M1054 282 l14 14 l28 -36" stroke="#34A853" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <path d="M210 282 H292" class="route"/>
    <path d="M458 282 H540" class="route"/>
    <path d="M706 282 H788" class="route"/>
    <path d="M954 282 H1020" class="route"/>
    <text x="236" y="262" class="small mono">edge</text>
    <text x="484" y="262" class="small mono">edge</text>
    <text x="732" y="262" class="small mono">edge</text>
  </g>
</svg>
