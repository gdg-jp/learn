<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Route branching and conditional execution</title>
  <desc id="desc">A router node returns an Event route and chooses either clarification or the default candidate workflow path.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#3C4043"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4285F4"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#202124" flood-opacity="0.12"/>
    </filter>
    <style>
      .font { font-family: "Google Sans", "Noto Sans JP", "Hiragino Sans", "Yu Gothic", Arial, sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #202124; }
      .sub { font-size: 20px; font-weight: 500; fill: #5F6368; }
      .label { font-size: 22px; font-weight: 700; fill: #202124; }
      .small { font-size: 17px; font-weight: 600; fill: #5F6368; }
      .mono { font-family: "Roboto Mono", "SFMono-Regular", Menlo, monospace; }
      .node { fill: #FFFFFF; stroke: #DADCE0; stroke-width: 2; }
      .route { stroke: #3C4043; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .route-blue { stroke: #4285F4; stroke-width: 5; fill: none; marker-end: url(#arrow-blue); stroke-linecap: round; stroke-linejoin: round; }
      .route-dashed { stroke: #5F6368; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 10 12; }
    </style>
  </defs>
  <rect width="1200" height="520" fill="#FFFFFF"/>
  <rect x="44" y="44" width="1112" height="432" rx="36" fill="#F1F3F4"/>
  <g class="font">
    <rect x="84" y="78" width="454" height="62" rx="18" fill="#4285F4"/>
    <text x="112" y="119" class="title" style="fill:#FFFFFF">ルート分岐と条件付き実行</text>
    <text x="84" y="174" class="sub">node が返す Event(route=...) の値で、次に実行する経路を選ぶ</text>

    <g filter="url(#shadow)">
      <rect x="92" y="246" width="126" height="72" rx="36" fill="#4285F4"/>
      <text x="124" y="291" fill="#FFFFFF" class="label">START</text>

      <rect x="292" y="226" width="190" height="112" rx="22" class="node"/>
      <circle cx="330" cy="282" r="20" fill="#E8F0FE"/>
      <path d="M320 274 l20 8 l-20 8 z" fill="#4285F4"/>
      <text x="362" y="276" class="label">Router</text>
      <text x="362" y="304" class="small mono">Event(route)</text>

      <rect x="620" y="196" width="190" height="76" rx="20" fill="#FEF7E0" stroke="#FDD663" stroke-width="2"/>
      <text x="666" y="244" class="label">RequestInput</text>

      <rect x="620" y="324" width="190" height="76" rx="20" fill="#E6F4EA" stroke="#CEEAD6" stroke-width="2"/>
      <text x="652" y="372" class="label">Candidate WF</text>

      <rect x="938" y="260" width="126" height="72" rx="36" fill="#4285F4"/>
      <text x="970" y="305" fill="#FFFFFF" class="label">NEXT</text>
    </g>

    <path d="M218 282 H284" class="route-blue"/>
    <path d="M482 282 C540 282 552 234 612 234" class="route"/>
    <path d="M482 282 C540 282 552 362 612 362" class="route"/>
    <path d="M810 234 C876 234 884 296 930 296" class="route-dashed"/>
    <path d="M810 362 C876 362 884 296 930 296" class="route"/>
    <text x="520" y="230" class="small mono">clarify</text>
    <text x="520" y="384" class="small mono">default</text>
    <text x="824" y="224" class="small">人間の回答後に戻る</text>
  </g>
</svg>
